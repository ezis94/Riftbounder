name: .NET

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Riftbounder.slnx

      - name: Verify formatting
        run: dotnet format Riftbounder.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build Riftbounder.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Riftbounder.slnx --configuration Release --no-build
